<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <div class="header-row">
      <h1 class="game-title">TETRIS</h1>
      <label class="theme-switch" title="Cambiar tema claro/oscuro">
        <input type="checkbox" id="theme-toggle" />
        <span class="slider"></span>
      </label>
    </div>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd><kbd>X</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd><kbd>Esc</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="start-screen" class="overlay">
      <div class="overlay-box">
        <p id="start-title" class="screen-title">TETRIS</p>
        <div class="menu-field">
          <label for="start-level-select">Nivel inicial</label>
          <select id="start-level-select"></select>
        </div>
        <div id="start-scores"></div>
        <button id="play-btn" class="menu-btn">Jugar</button>
      </div>
    </div>

    <div id="pause-menu" class="overlay hidden">
      <div class="overlay-box">
        <p id="pause-title" class="screen-title">PAUSA</p>
        <div class="menu-field">
          <label for="pause-level-select">Nivel inicial</label>
          <select id="pause-level-select"></select>
        </div>
        <div class="menu-buttons">
          <button id="resume-btn" class="menu-btn">Reanudar</button>
          <button id="pause-restart-btn" class="menu-btn">Reiniciar</button>
          <button id="controls-btn" class="menu-btn">Ver controles</button>
        </div>
        <ul id="pause-controls-list" class="hidden">
          <li><kbd>←</kbd><kbd>→</kbd> mover</li>
          <li><kbd>↑</kbd><kbd>X</kbd> rotar</li>
          <li><kbd>↓</kbd> bajar</li>
          <li><kbd>Space</kbd> caída</li>
          <li><kbd>P</kbd><kbd>Esc</kbd> pausa</li>
        </ul>
      </div>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn" class="menu-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
